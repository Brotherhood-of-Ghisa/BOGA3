name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      # Docs drift guard (`docs-check` lane): generated blocks (lane matrix)
      # current, lane-name citations valid, relative .md links resolve, spec
      # ownership headers present. Pure python3/bash — runs before npm ci.
      - name: Docs check
        run: ./scripts/gen-docs.sh check
        working-directory: ${{ github.workspace }}
        timeout-minutes: 2

      # Meta-tooling self-tests (`meta-tests` lane): gen-docs / test-for /
      # pr-check against fixtures. Infra-free.
      - name: Meta tests
        run: ./scripts/tests/run-meta-tests.sh
        working-directory: ${{ github.workspace }}
        timeout-minutes: 2

      # PR Tests-table check: the body's gate table is filled, every ⛔ has a
      # reason, and gates the changed paths REQUIRE (scripts/triggers.tsv) are
      # not marked N/A (warn-only for now; structural violations fail). Skips
      # the trigger cross-check gracefully if the base isn't fetchable.
      - name: PR Tests-table check
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=200 || true
          python3 -c "import json,os;print(json.load(open(os.environ['GITHUB_EVENT_PATH']))['pull_request'].get('body') or '')" > /tmp/pr-body.md
          ./scripts/pr-check.sh --body /tmp/pr-body.md --diff "origin/${{ github.base_ref }}...HEAD"
        timeout-minutes: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Hard ceiling on the unit run. A leaked handle that keeps Jest alive
      # AFTER tests pass (the failure mode that once hung this gate silently)
      # is killed here in minutes instead of running to the default 6h job
      # timeout. Deliberately NOT `--forceExit`, which would hide the leak.
      - name: Test
        run: npm test
        timeout-minutes: 5

      # Authoritative open-handle guard: runs the suite serially with
      # --detectOpenHandles so a new leak (unclosed connection, lingering
      # timer, real Supabase transport) fails loudly with a stack — caught here
      # before it can silently hang a future run. Serial + comprehensive (~tens
      # of seconds); separate from the fast `npm test` feedback step above.
      - name: Open-handle guard
        run: npm run test:handles
        timeout-minutes: 5
