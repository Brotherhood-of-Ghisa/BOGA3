name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Hard ceiling on the unit run. A leaked handle that keeps Jest alive
      # AFTER tests pass (the failure mode that once hung this gate silently)
      # is killed here in minutes instead of running to the default 6h job
      # timeout. Deliberately NOT `--forceExit`, which would hide the leak.
      - name: Test
        run: npm test
        timeout-minutes: 5

      # Authoritative open-handle guard: runs the suite serially with
      # --detectOpenHandles so a new leak (unclosed connection, lingering
      # timer, real Supabase transport) fails loudly with a stack — caught here
      # before it can silently hang a future run. Serial + comprehensive (~tens
      # of seconds); separate from the fast `npm test` feedback step above.
      - name: Open-handle guard
        run: npm run test:handles
        timeout-minutes: 5
