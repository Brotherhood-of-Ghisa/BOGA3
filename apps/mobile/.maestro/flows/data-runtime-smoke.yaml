appId: com.dinoderek.mobile
---
- openLink: "boga3://maestro-harness?reset=data&teleport=session-list"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 30000
- takeScreenshot: "03-data-runtime-smoke-start"
- openLink: "boga3://maestro-harness?reset=data&teleport=session-recorder"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "session-recorder-empty-state"
    timeout: 30000
- tapOn:
    id: "start-session-button"
- extendedWaitUntil:
    visible:
      id: "session-recorder-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
    optional: true
- tapOn: "Log new exercise"
- tapOn: "Exercise filter input"
- inputText: "Barbell Back Squat"
- hideKeyboard:
    optional: true
# Pick the seeded "Barbell Back Squat" exercise by its accessibility label
# ("Select exercise <name>", session-recorder.tsx) rather than a fragile
# `point: "50%,26%"` coordinate tap. On a cold sim the picker list can render a
# beat later than on a warm one, so a coordinate tap raced the row layout and
# landed on empty space — leaving no exercise selected and failing the later
# "Weight for exercise 1 set 1" step. Filtering by the exact seeded name yields a
# deterministic, content-stable row, and `extendedWaitUntil` rides out the cold
# render before the tap.
- extendedWaitUntil:
    visible:
      text: "Select exercise Barbell Back Squat"
    timeout: 15000
- tapOn:
    text: "Select exercise Barbell Back Squat"
- tapOn: "Weight for exercise 1 set 1"
- inputText: "135"
- tapOn: "Reps for exercise 1 set 1"
- inputText: "8"
- tapOn: "Submit Session"
- tapOn:
    text: "Submit Session"
    optional: true
- tapOn:
    text: "Remove incomplete sets and submit"
    optional: true
- tapOn:
    text: "Remove empty exercises and submit"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- tapOn:
    id: "stats-card-sessions"
- assertVisible:
    id: "completed-history-scroll"
- takeScreenshot: "04-data-runtime-smoke-success"
