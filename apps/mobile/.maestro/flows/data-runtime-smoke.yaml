appId: com.dinoderek.mobile
---
# No per-openLink Open/Continue/Close dismissal taps: the dev-client URL-scheme
# trust dialog ("Open in <App>?") is pre-authorized in maestro-ios-launch.sh
# (maestro_preauthorize_url_schemes seeds the schemeapproval record), location is
# pre-granted (maestro_preauthorize_location), and the one-time expo-dev-client
# menu sheet is dismissed by the warm-up before this flow runs — so none of those
# dialogs render here. Each optional tap on an ABSENT element costs the full ~7s
# optionalLookupTimeoutMs (measured: 3×7.1s + 1×7.0s + 1×7.1s ≈ 35s of dead wait
# in the previous version), and every one was WARNED/absent on every run. If
# pre-authorization ever regresses, the dialog blocks the next assertion and the
# flow fails loudly (the correct signal) instead of silently absorbing ~7s/tap.
- openLink: "${MAESTRO_IOS_DEV_CLIENT_URL}"
- openLink: "boga3://maestro-harness?reset=data&teleport=session-list"
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 30000
- takeScreenshot: "03-data-runtime-smoke-start"
- openLink: "boga3://maestro-harness?reset=data&teleport=session-recorder"
- extendedWaitUntil:
    visible:
      id: "start-session-button"
    timeout: 30000
- tapOn:
    id: "start-session-button"
- extendedWaitUntil:
    visible:
      id: "session-recorder-screen"
    timeout: 30000
- extendedWaitUntil:
    visible:
      text: "No exercises logged yet."
    timeout: 30000
- tapOn: "Log new exercise"
- tapOn: "Exercise filter input"
- inputText: "Barbell Back Squat"
- hideKeyboard:
    optional: true
# Pick the seeded "Barbell Back Squat" exercise by its accessibility label
# ("Select exercise <name>", session-recorder.tsx) rather than a fragile
# `point: "50%,26%"` coordinate tap. On a cold sim the picker list can render a
# beat later than on a warm one, so a coordinate tap raced the row layout and
# landed on empty space — leaving no exercise selected and failing the later
# "Weight for exercise 1 set 1" step. Filtering by the exact seeded name yields a
# deterministic, content-stable row, and `extendedWaitUntil` rides out the cold
# render before the tap.
- extendedWaitUntil:
    visible:
      text: "Select exercise Barbell Back Squat"
    timeout: 15000
- tapOn:
    text: "Select exercise Barbell Back Squat"
- tapOn: "Weight for exercise 1 set 1"
- inputText: "135"
- tapOn: "Reps for exercise 1 set 1"
- inputText: "8"
# The session has one complete set (weight + reps), so Submit goes straight
# through with no "Remove incomplete/empty" confirmation dialog — the previous
# optional re-tap + confirmation taps here were always absent (WARNED) and cost
# ~7s. We assert the success screen directly; a missing/blocked submit fails the
# extendedWaitUntil loudly.
- tapOn: "Submit Session"
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 30000
- tapOn:
    id: "stats-card-sessions"
- assertVisible:
    id: "completed-history-scroll"
- takeScreenshot: "04-data-runtime-smoke-success"
