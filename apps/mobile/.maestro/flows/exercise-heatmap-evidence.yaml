appId: com.dinoderek.mobile
---
# M17 visual evidence — exercise calendar heatmap
# Seed exercise history via recorder (populates catalog + sessions), then capture evidence.

# --- Start: teleport to stats-history on fresh data (empty state) ---
- openLink: "boga3://maestro-harness?reset=data&teleport=session-list"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 30000
- tapOn:
    id: "stats-view-mode-chip"
    optional: true
- extendedWaitUntil:
    visible:
      id: "stats-exercise-list-empty"
    timeout: 10000
- takeScreenshot: "m17-01-heatmap-empty-state"

# --- Seed data via recorder (same path as data-runtime-smoke) ---
- openLink: "boga3://maestro-harness?reset=data&teleport=session-recorder"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "session-recorder-empty-state"
    timeout: 30000
- tapOn:
    id: "start-session-button"
- extendedWaitUntil:
    visible:
      id: "session-recorder-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
    optional: true
- tapOn: "Log new exercise"
- tapOn: "Exercise filter input"
- inputText: "Barbell Back Squat"
- hideKeyboard:
    optional: true
- extendedWaitUntil:
    visible:
      text: "Select exercise Barbell Back Squat"
    timeout: 15000
- tapOn:
    text: "Select exercise Barbell Back Squat"
- tapOn: "Weight for exercise 1 set 1"
- inputText: "100"
- tapOn: "Reps for exercise 1 set 1"
- inputText: "8"
- tapOn: "Submit Session"
- tapOn:
    text: "Submit Session"
    optional: true
- tapOn:
    text: "Remove incomplete sets and submit"
    optional: true
- tapOn:
    text: "Remove empty exercises and submit"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true

# --- Switch to Heatmap mode: populated exercise list ---
- extendedWaitUntil:
    visible:
      id: "stats-exercise-list"
    timeout: 10000
- takeScreenshot: "m17-02-exercise-list-populated"

# --- Tap exercise to open overlay ---
- tapOn:
    text: "Barbell Back Squat"
- extendedWaitUntil:
    visible:
      id: "stats-exercise-history-overlay"
    timeout: 15000
- takeScreenshot: "m17-03-overlay-populated"

# --- Tap a week cell to show the week-selection banner ---
- tapOn:
    id: "stats-exercise-history-heatmap-cell-2026-06-02"
    optional: true
- tapOn:
    id: "stats-exercise-history-heatmap-cell-2026-05-26"
    optional: true
- takeScreenshot: "m17-04-week-selected"

# --- Switch metric to Near Failure ---
- tapOn:
    id: "stats-exercise-history-metric-chip-nearFailureCount"
- takeScreenshot: "m17-05-metric-switch"

# --- Dismiss via backdrop ---
- tapOn:
    id: "stats-exercise-history-backdrop"
- extendedWaitUntil:
    notVisible:
      id: "stats-exercise-history-overlay"
    timeout: 5000
- takeScreenshot: "m17-06-backdrop-dismissed"
