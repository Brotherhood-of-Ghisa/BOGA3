appId: com.dinoderek.mobile
---
# Login-on-start is enforced in this auth-configured lane: a clean launch with no
# session lands on the sign-in gate, so this flow signs in through the gate first
# and then exercises the in-Profile account affordances (username edit + update +
# sign-out). Signing out returns to the gate rather than to a data screen.
# `clearState` relaunches the dev client with a wiped sandbox, which drops its
# connection to the Metro dev server — a cold dev client comes up on its own
# launcher screen, not the app. Re-open the dev-client deep link so the app
# bundle reloads from Metro into the freshly-wiped sandbox before asserting.
- launchApp:
    clearState: true
# Re-open the dev-client deep link (carrying this worktree's Metro port, exported
# by maestro-ios-launch.sh) to re-point the wiped dev client at Metro. The
# URL-scheme trust dialog is pre-authorized in maestro-ios-launch.sh, so it never
# renders — we do NOT tap "Open" (it cost the full ~7s optionalLookupTimeoutMs
# when absent, and a blind tapOn fetched the view hierarchy mid-reload, which on
# iOS-26 throws a transient `kAXErrorInvalidUIElement` and FAILED the flow).
#
# The expo-dev-client developer-menu, however, DOES reappear after clearState:
# the reinstall wipes the dev client's "seen menu" flag, so opening the deep link
# surfaces its onboarding intro ("Continue") which advances to the full dev menu,
# and that menu covers and BLOCKS the sign-in screen (both states verified by
# failure screenshots). Dismiss it deterministically: wait for the intro, tap
# Continue (intro -> dev menu), then Close (X, dev menu -> app). Waiting for the
# button instead of firing a blind optional tap makes this both faster (it fires
# the instant the sheet renders instead of burning the ~7s optional timeout) and
# robust (extendedWaitUntil polls through the cold-bundle reload and the transient
# iOS-26 `kAXErrorInvalidUIElement` hierarchy errors a blind tapOn FAILS on). The
# previously-tapped "Open" (URL-scheme trust dialog) is pre-authorized away and is
# not tapped. If this dismissal ever stops matching, the sign-in assertion below
# fails loudly.
- openLink: "${MAESTRO_IOS_DEV_CLIENT_URL}"
- extendedWaitUntil:
    visible:
      text: "Continue"
    timeout: 30000
# Let the sheet finish animating before tapping so the tap doesn't fetch a
# hierarchy mid-transition; then retry each tap so the transient iOS-26
# `kAXErrorInvalidUIElement` (a stale element ref during the post-reload churn)
# is re-attempted rather than failing the run. Each retry wraps a single tap and
# is idempotent: the element stays present until the tap succeeds.
- waitForAnimationToEnd:
    timeout: 4000
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Continue"
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Close"
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 60000
- takeScreenshot: "05-auth-profile-gate-start"
- tapOn:
    id: "sign-in-email-input"
- inputText: "${MAESTRO_AUTH_PROFILE_EMAIL}"
- tapOn:
    id: "sign-in-password-input"
- inputText: "${MAESTRO_AUTH_PROFILE_PASSWORD}"
- tapOn:
    id: "sign-in-submit-button"
- assertNotVisible:
    id: "sign-in-screen"
# Drain the first cycle: stamp the bootstrap flag AND teleport to the normal
# route in one harness link. The flag is stamped before the teleport navigates,
# so the first-sync gate has lifted by the time the route renders.
- openLink: "boga3://maestro-harness?bootstrap=complete&teleport=session-list"
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 60000
# Now signed in: open Profile and exercise the account affordances.
# Use extendedWaitUntil (poll) rather than a bare assertVisible after each
# navigating tap: the tab/screen transition can lag a beat on the cold-JIT first
# render (an immediate assert raced it and flaked once), and polling rides that
# out without padding the run.
- tapOn:
    id: "top-level-settings-button"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 15000
- tapOn:
    id: "settings-profile-row"
- extendedWaitUntil:
    visible:
      id: "profile-signed-in-card"
    timeout: 15000
- takeScreenshot: "06-auth-profile-signed-in"
- tapOn:
    id: "profile-edit-button"
- tapOn:
    id: "profile-username-input"
- eraseText: 120
- inputText: "${MAESTRO_AUTH_PROFILE_USERNAME}"
- tapOn:
    id: "profile-signed-in-card"
- tapOn:
    id: "profile-update-button"
- assertVisible:
    id: "profile-update-feedback"
- assertVisible: "Profile updated."
- scrollUntilVisible:
    element:
      id: "profile-sign-out-button"
    direction: DOWN
- tapOn:
    id: "profile-sign-out-button"
# Signing out drops the session; the route-layer guard returns to the gate.
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 30000
- takeScreenshot: "07-auth-profile-signed-out-end"
