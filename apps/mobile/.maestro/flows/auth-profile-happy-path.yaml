appId: com.dinoderek.mobile
---
# Login-on-start is enforced in this auth-configured lane: a clean launch with no
# session lands on the sign-in gate, so this flow signs in through the gate first
# and then exercises the in-Profile account affordances (username edit + update +
# sign-out). Signing out returns to the gate rather than to a data screen.
# `clearState` relaunches the dev client with a wiped sandbox, which drops its
# connection to the Metro dev server — a cold dev client comes up on its own
# launcher screen, not the app. Re-open the dev-client deep link so the app
# bundle reloads from Metro into the freshly-wiped sandbox before asserting.
- launchApp:
    clearState: true
# `clearState: true` wipes the Expo dev client's stored Metro dev-server URL, so
# on relaunch the client shows its own launcher instead of reconnecting and the
# RN app never loads. Re-open the dev-client deep link (carrying this worktree's
# Metro port, exported by maestro-ios-launch.sh) to re-point it at Metro. Opening
# that URL also surfaces the expo-dev-client developer-menu onboarding sheet over
# the loaded app, so the Continue/Close taps dismiss it (and "Open" clears the
# URL-scheme trust dialog) before the sign-in gate assertion. `waitForAnimationToEnd`
# lets the sheet animate in first; every optional tap no-ops when its target is absent.
- openLink: "${MAESTRO_IOS_DEV_CLIENT_URL}"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 60000
- takeScreenshot: "05-auth-profile-gate-start"
- tapOn:
    id: "sign-in-email-input"
- inputText: "${MAESTRO_AUTH_PROFILE_EMAIL}"
- tapOn:
    id: "sign-in-password-input"
- inputText: "${MAESTRO_AUTH_PROFILE_PASSWORD}"
- tapOn:
    id: "sign-in-submit-button"
- assertNotVisible:
    id: "sign-in-screen"
# Drain the first cycle: stamp the bootstrap flag AND teleport to the normal
# route in one harness link. The flag is stamped before the teleport navigates,
# so the first-sync gate has lifted by the time the route renders.
- openLink: "boga3://maestro-harness?bootstrap=complete&teleport=session-list"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 60000
# Now signed in: open Profile and exercise the account affordances.
- tapOn:
    id: "top-level-settings-button"
- assertVisible:
    id: "settings-screen"
- tapOn:
    id: "settings-profile-row"
- assertVisible:
    id: "profile-signed-in-card"
- takeScreenshot: "06-auth-profile-signed-in"
- tapOn:
    id: "profile-edit-button"
- tapOn:
    id: "profile-username-input"
- eraseText: 120
- inputText: "${MAESTRO_AUTH_PROFILE_USERNAME}"
- tapOn:
    id: "profile-signed-in-card"
- tapOn:
    id: "profile-update-button"
- assertVisible:
    id: "profile-update-feedback"
- assertVisible: "Profile updated."
- scrollUntilVisible:
    element:
      id: "profile-sign-out-button"
    direction: DOWN
- tapOn:
    id: "profile-sign-out-button"
# Signing out drops the session; the route-layer guard returns to the gate.
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 30000
- takeScreenshot: "07-auth-profile-signed-out-end"
