appId: com.dinoderek.mobile
---
- takeScreenshot: "01-app-launch"
- openLink: "${MAESTRO_IOS_DEV_CLIENT_URL}"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- openLink: "boga3://maestro-harness?teleport=session-list"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 30000
- openLink: "boga3://maestro-harness?teleport=session-recorder"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "start-session-button"
    timeout: 30000
- tapOn:
    id: "start-session-button"
- extendedWaitUntil:
    visible:
      id: "session-recorder-screen"
    timeout: 30000
- extendedWaitUntil:
    visible:
      text: "No exercises logged yet."
    timeout: 30000
- takeScreenshot: "02-session-recorder-visible"
