appId: com.dinoderek.mobile
---
# First-sync gate: after a fresh install and sign-in, a signed-in user whose
# device has not yet drained its first sync sees a full-screen "Setting up your
# data…" block (phase label + advancing activity indicator) in place of any data
# screen. Once the first cycle completes (the bootstrap flag is set) the block
# dismisses and the normal route renders.
#
# This flow runs in the auth-configured lane (a local Supabase baseline is
# provisioned by the runner). The block's dismissal is driven deterministically
# via the test harness (which stamps the bootstrap flag), standing in for the
# bootstrapper that sets it in production, so the gate's block→dismiss transition
# is asserted within the foreground window without depending on live server data.

# Cold launch with no session: the route-layer guard lands on sign-in.
# `clearState` relaunches the dev client with a wiped sandbox, which drops its
# connection to the Metro dev server — a cold dev client comes up on its own
# launcher screen, not the app. Re-open the dev-client deep link so the app
# bundle reloads from Metro into the freshly-wiped sandbox. Reloading into a
# wiped sandbox also surfaces the one-time Expo developer-menu sheet over the
# app, so dismiss it ("Open" the deep link, then "Continue"/"Close" the sheet)
# before asserting on the screen underneath.
- launchApp:
    clearState: true
- openLink: "${MAESTRO_IOS_DEV_CLIENT_URL}"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 60000

# Sign in. The first sync has not yet drained, so the gate blocks instead of
# letting a data screen render.
- tapOn:
    id: "sign-in-email-input"
- inputText: "${MAESTRO_AUTH_PROFILE_EMAIL}"
- tapOn:
    id: "sign-in-password-input"
- inputText: "${MAESTRO_AUTH_PROFILE_PASSWORD}"
- tapOn:
    id: "sign-in-submit-button"

# Drive the gate's ONLINE in-progress state deterministically, pinning it the
# instant the session is live. Two reasons the natural in-progress block is not a
# reliable assertion target on the simulator:
#   1. The sim's NetInfo cannot confirm internet reachability.
#   2. With the connectivity fix, the real first cycle now succeeds and stamps the
#      bootstrap flag within ~a second of sign-in, dismissing the gate too fast to
#      observe — so even a natural "block is visible" wait races and flakes.
# The harness pins the in-progress block (spinner + advancing counters); the pin
# overrides the bootstrap flag, so it holds the online "setting up your data"
# surfaces up deterministically regardless of how fast the real cycle drains. This
# stands in for a real connected device mid-first-cycle without weakening the
# assertion — the block must still render its online in-progress surfaces.
- openLink: "boga3://maestro-harness?gate=in-progress&teleport=session-list"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "sync-gate-block"
    timeout: 30000
- assertVisible:
    id: "sync-gate-phase-label"
- assertVisible:
    id: "sync-gate-activity-indicator"
- assertNotVisible:
    id: "stats-history-screen"
- takeScreenshot: "10-sync-gate-block-visible"

# Complete the first cycle: clear the in-progress pin AND stamp the bootstrap
# flag in one harness link, then teleport to the normal route. With the pin
# cleared and the flag set, the gate has lifted by the time the route renders,
# so the block dismisses and stats-history renders well within a minute.
- openLink: "boga3://maestro-harness?gate=clear&bootstrap=complete&teleport=session-list"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 60000
- assertNotVisible:
    id: "sync-gate-block"
- takeScreenshot: "11-sync-gate-dismissed"
