appId: com.dinoderek.mobile
---
# Seed exercise history data and teleport to the Stats/History screen
- openLink: "boga3://maestro-harness?reset=data&fixture=exercise-block-history&teleport=session-list"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 30000
- takeScreenshot: "01-stats-screen"

# --- Switch to muscle view (default is exercise list after redesign) ---
- tapOn:
    id: "stats-view-mode-chip"
- extendedWaitUntil:
    visible:
      id: "stats-scroll"
    timeout: 10000

# --- Single muscle: tap Chest (collapsed, single-muscle family) ---
- tapOn:
    text: "Chest"
- extendedWaitUntil:
    visible:
      id: "stats-muscle-history-overlay"
    timeout: 15000
- takeScreenshot: "02-chest-overlay-volume"

# Muscle history exposes exactly the two meaningful muscle-level metrics.
- assertVisible:
    id: "stats-muscle-history-metric-chip-totalVolume"
- assertVisible:
    id: "stats-muscle-history-metric-chip-nearFailureCount"
- assertNotVisible:
    id: "stats-muscle-history-metric-chip-estimatedRM1"
- assertNotVisible:
    id: "stats-muscle-history-metric-chip-highestWeight"

# Heatmap is present; defaults to the weekly bar view
- assertVisible:
    id: "stats-muscle-history-heatmap"

# Daily/Weekly view toggle must be visible
- assertVisible:
    id: "stats-muscle-history-view-chip-weekly"
- assertVisible:
    id: "stats-muscle-history-view-chip-daily"

# Daily defaults to the M19 per-side Volume metric.
- tapOn:
    id: "stats-muscle-history-view-chip-daily"
- assertVisible:
    id: "stats-muscle-history-heatmap"
- takeScreenshot: "02b-chest-overlay-daily-volume"

# Switch metrics while staying in Daily.
- tapOn:
    id: "stats-muscle-history-metric-chip-nearFailureCount"
- takeScreenshot: "02c-chest-overlay-daily-near-failure"

# Return to Weekly; the selected metric remains Near failure.
- tapOn:
    id: "stats-muscle-history-view-chip-weekly"
- assertVisible:
    id: "stats-muscle-history-heatmap"

# Tap the populated current-week cell to show a real selected-metric value.
- tapOn:
    id: "stats-muscle-history-heatmap-cell-2026-07-20"
- takeScreenshot: "03-week-selected-banner-near-failure"

# Assert banner appears
- assertVisible:
    id: "stats-muscle-history-week-banner"

# Switch back to Volume while staying in Weekly.
- tapOn:
    id: "stats-muscle-history-metric-chip-totalVolume"
- takeScreenshot: "04-weekly-volume-with-banner"

# Dismiss overlay
- tapOn:
    id: "stats-muscle-history-close"
- extendedWaitUntil:
    notVisible:
      id: "stats-muscle-history-overlay"
    timeout: 5000

# --- Family-level: tap Back family header (multi-muscle) ---
- tapOn:
    id: "stats-family-header-back"
- extendedWaitUntil:
    visible:
      id: "stats-muscle-history-overlay"
    timeout: 15000
- takeScreenshot: "05-back-family-overlay"
- assertVisible:
    id: "stats-muscle-history-heatmap"
- assertVisible:
    id: "stats-muscle-history-metric-chip-totalVolume"
- assertVisible:
    id: "stats-muscle-history-metric-chip-nearFailureCount"

# Dismiss
- tapOn:
    id: "stats-muscle-history-close"
- extendedWaitUntil:
    notVisible:
      id: "stats-muscle-history-overlay"
    timeout: 5000
- takeScreenshot: "06-overlay-dismissed"
