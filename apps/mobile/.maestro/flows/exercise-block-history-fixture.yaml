appId: com.dinoderek.mobile
---
- openLink: "boga3://maestro-harness?reset=data&fixture=exercise-block-history&teleport=session-recorder"
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "session-recorder-empty-state"
    timeout: 30000
- tapOn:
    id: "start-session-button"
- extendedWaitUntil:
    visible:
      id: "session-recorder-screen"
    timeout: 30000
- tapOn: "Log new exercise"
- tapOn: "Exercise picker options"
- tapOn: "Turn grouping off"
- tapOn: "Exercise picker options"
- tapOn: "Exercise filter input"
- inputText: "back squat"
- hideKeyboard:
    optional: true
- tapOn: "Select Exercise"
- extendedWaitUntil:
    visible:
      text: "Select exercise Barbell Back Squat"
    timeout: 15000
- tapOn:
    text: "Select exercise Barbell Back Squat"
- tapOn:
    id: "exercise-picker-add-empty-set-button"
- extendedWaitUntil:
    visible:
      id: "exercise-block-history-panel-1-collapsed"
    timeout: 30000
- takeScreenshot: "exercise-block-comparison-start-collapsed"
- tapOn:
    id: "exercise-block-history-panel-1-collapsed"
- extendedWaitUntil:
    visible:
      id: "exercise-block-history-panel-1"
    timeout: 10000
- assertVisible: "Previous"
- assertVisible: "Current"
- assertVisible: "Near failure"
- assertVisible: "1/5"
- tapOn: "Weight for exercise 1 set 1"
- inputText: "200"
- tapOn: "Reps for exercise 1 set 1"
- inputText: "5"
- hideKeyboard:
    optional: true
- takeScreenshot: "exercise-block-comparison-expanded"
- tapOn:
    id: "exercise-block-history-panel-1-toggle"
- extendedWaitUntil:
    visible:
      id: "exercise-block-history-panel-1-collapsed"
    timeout: 10000
- takeScreenshot: "exercise-block-comparison-collapsed"
- tapOn:
    id: "exercise-block-history-panel-1-collapsed"
- tapOn:
    id: "exercise-block-history-panel-1-older"
- assertVisible: "2/5"
- takeScreenshot: "exercise-block-comparison-older"
- tapOn: "Log new exercise"
- tapOn: "Exercise filter input"
- inputText: "lat pulldown"
- hideKeyboard:
    optional: true
- tapOn: "Select Exercise"
- extendedWaitUntil:
    visible:
      text: "Select exercise Lat Pulldown"
    timeout: 15000
- tapOn:
    text: "Select exercise Lat Pulldown"
- tapOn:
    id: "exercise-picker-add-empty-set-button"
- extendedWaitUntil:
    visible:
      id: "exercise-block-history-panel-2-empty-collapsed"
    timeout: 30000
- takeScreenshot: "exercise-block-history-empty-collapsed"
- tapOn:
    id: "exercise-block-history-panel-2-empty-collapsed"
- extendedWaitUntil:
    visible:
      id: "exercise-block-history-panel-2-empty"
    timeout: 10000
- takeScreenshot: "exercise-block-history-empty-expanded"
