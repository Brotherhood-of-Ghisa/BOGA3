appId: com.dinoderek.mobile
---
# First-sync gate — REAL cycle (no harness stamp). The companion
# `sync-gate-first-cycle.yaml` asserts the gate's ONLINE in-progress surfaces
# deterministically by PINNING them through the harness, because with the
# connectivity fix in place (scheduler keys off NetInfo.isConnected) the real
# first cycle now drains and dismisses the gate within ~1s of sign-in — too fast
# to observe its in-progress UI without a flaky race. This flow proves the OTHER
# half: that the real bootstrapper→seed→push→pull cycle, run against the lane's
# provisioned local Supabase, actually lifts the gate on its own and lands the
# user on a data screen — with NO `bootstrap=complete` harness stamp anywhere.
#
# This flow runs in the auth-configured lane (a local Supabase baseline is
# provisioned by the runner, which also exports the fixture credentials). It
# deliberately makes NO assertion on the transient in-progress block: the real
# cycle is too fast to show it reliably, and the companion flow owns that surface.

# Cold launch with no session: the route-layer guard lands on sign-in.
# `clearState` relaunches the dev client with a wiped sandbox, which drops its
# connection to the Metro dev server — a cold dev client comes up on its own
# launcher screen, not the app. Re-open the dev-client deep link so the app
# bundle reloads from Metro into the freshly-wiped sandbox. Reloading into a
# wiped sandbox also surfaces the one-time Expo developer-menu sheet over the
# app, so dismiss it ("Open" the deep link, then "Continue"/"Close" the sheet)
# before asserting on the screen underneath. `waitForAnimationToEnd` lets the
# sheet finish animating in so the dismissal taps land on it; every dismissal tap
# is an optional no-op when its target is absent.
- launchApp:
    clearState: true
- openLink: "${MAESTRO_IOS_DEV_CLIENT_URL}"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 60000
- assertVisible:
    id: "sign-in-card"
# No data screen may render before sign-in.
- assertNotVisible:
    id: "stats-history-screen"
- takeScreenshot: "12-sync-gate-real-cycle-signed-out"

# Sign in as the fixture user. On a live session the auth layer fires a real
# `requestSync()` (src/auth/service.ts), so the first authenticated cycle starts
# within ~1s instead of waiting for the idle backstop. The route layer redirects
# off sign-in to `/`, where the first-sync gate stands in front of the data
# screen until the REAL cycle drains and stamps `bootstrap_completed_at`.
- tapOn:
    id: "sign-in-email-input"
- inputText: "${MAESTRO_AUTH_PROFILE_EMAIL}"
- tapOn:
    id: "sign-in-password-input"
- inputText: "${MAESTRO_AUTH_PROFILE_PASSWORD}"
- tapOn:
    id: "sign-in-submit-button"

# Let the real first cycle complete on its own. No harness link is opened: the
# bootstrapper runs the first full pull against the provisioned local Supabase,
# seeds the starter catalog iff the server holds nothing, pushes, pulls again to
# converge, and stamps `bootstrap_completed_at` LAST — at which point the gate
# bridge's poll lifts the block and `/` redirects through to the Stats/History
# tab. A generous window absorbs sim/Metro warm-up and, worst case, the scheduler
# backstop; the real cycle normally drains in ~1s. Reaching stats-history-screen
# here proves the gate dismissed from real sync progress, not a test stamp.
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 90000
# The block must be gone, and it must have lifted from the real cycle — there is
# no `bootstrap=complete` harness stamp in this flow.
- assertNotVisible:
    id: "sync-gate-block"
- takeScreenshot: "13-sync-gate-real-cycle-dismissed"
