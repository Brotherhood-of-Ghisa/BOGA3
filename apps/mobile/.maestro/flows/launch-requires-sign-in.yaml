appId: com.dinoderek.mobile
---
# Login-on-start enforcement: a configured build with no restored session must
# land on the dedicated sign-in screen before any data screen renders, and must
# reach data screens only after a successful sign-in.
#
# This flow runs in the auth-configured lane (a local Supabase baseline is
# provisioned by the runner). The infra-free smoke/data-smoke gate build has no
# Supabase configuration, so the guard is a deliberate no-op there and those
# flows continue to reach data screens directly.

# Cold launch with no session: the guard redirects to the sign-in screen.
- launchApp:
    clearState: true
# `clearState: true` wipes the Expo dev client's stored Metro dev-server URL, so
# on relaunch the client shows its own launcher ("No development servers found")
# instead of reconnecting — the RN app, and therefore the sign-in gate, never
# loads. Re-open the dev-client deep link to re-point it at the running Metro (the
# URL, carrying this worktree's Metro port, is exported by the runtime harness in
# maestro-ios-launch.sh). Opening that URL also surfaces expo-dev-client's
# developer-menu onboarding sheet on top of the freshly-loaded app, so dismiss it
# (Continue / Close) before asserting; the "Open" tap clears the first-launch
# URL-scheme trust dialog. `waitForAnimationToEnd` lets the sheet finish animating
# in so the dismissal taps land on it. Every dismissal tap is an optional no-op
# when its target is absent.
- openLink: "${MAESTRO_IOS_DEV_CLIENT_URL}"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 30000
- assertVisible:
    id: "sign-in-card"
# No data screen may render behind or before the gate.
- assertNotVisible:
    id: "stats-history-screen"
- takeScreenshot: "08-launch-requires-sign-in"

# Signing in from the gate lets the app proceed to the normal route.
- tapOn:
    id: "sign-in-email-input"
- inputText: "${MAESTRO_AUTH_PROFILE_EMAIL}"
- tapOn:
    id: "sign-in-password-input"
- inputText: "${MAESTRO_AUTH_PROFILE_PASSWORD}"
- tapOn:
    id: "sign-in-submit-button"
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 30000
- assertNotVisible:
    id: "sign-in-screen"
- takeScreenshot: "09-sign-in-reaches-data"
