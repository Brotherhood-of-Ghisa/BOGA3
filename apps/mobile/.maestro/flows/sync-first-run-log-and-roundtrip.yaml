appId: com.dinoderek.mobile
---
# First-run end-to-end round-trip — REAL cycle, real Supabase, on the simulator.
#
# This is the device-level proof that a brand-new user's data is bootstrapped
# locally AND lands in the remote database, and that a subsequently logged
# workout is uploaded by sync. It runs in the Supabase-backed sync-e2e lane (the
# runner provisions a local Supabase baseline and exports the fixture
# credentials), so every cycle here talks to a real server.
#
# ISOLATION — this flow signs in as a DEDICATED fixture user (user_b, passed in
# as MAESTRO_ROUNDTRIP_EMAIL/PASSWORD by the lane runner). Per the
# one-user-per-flow rule (docs/specs/11), every Supabase-backed Maestro flow owns
# its OWN fixture user so no flow ever depends on — or is corrupted by — another
# flow's residual server state (auth-profile-happy-path owns user_a; this flow
# owns user_b; enforced by scripts/tests/maestro-fixture-users.test.sh). A
# dedicated, otherwise-untouched user also makes this flow's first sign-in
# deterministic: it always finds an EMPTY server -> the bootstrapper's SEED branch
# runs -> the FULL catalog is seeded locally, so the "Barbell Back Squat" pick in
# phase B is guaranteed present. (A passing run pushes user_b's complete catalog
# to dirty=0 in phase C, so even repeated lane runs that later hit user_b's pull
# branch still get a complete catalog.)
#
# Phases (each maps to a step in the user-asked flow):
#   A. New user signs in -> the REAL bootstrapper -> seed -> push -> pull cycle
#      runs against the provisioned Supabase and lifts the first-sync gate on its
#      own (NO `bootstrap=complete` harness stamp). Landing on the data screen
#      proves: logged in + all bootstrap data seeded locally.
#   B. Log exactly ONE exercise (Barbell Back Squat, 1 set) in a session.
#   C. Force a sync from the Settings sync-status surface and wait for "Pending
#      changes" to reach 0. This is the run-SPECIFIC upload proof: the dirty rows
#      were created THIS run in (B) on a freshly-bootstrapped local DB, so
#      draining them to 0 means the logged exercise was accepted by the server.
#   D. Fully wipe the device (clearState wipes BOTH the SQLite data AND the
#      SecureStore session — see src/auth/storage.ts) and sign in again. The
#      bootstrapper now PULLS from the (non-empty) server, so the logged workout
#      reappears in history. After a full local wipe the ONLY source of any
#      session is the remote DB — so a restored session proves the data is in the
#      remote database.
#
# Why no exact-count / unique-row assertion in (D): the lane reuses a running
# local Supabase WITHOUT reset between runs (ensure-local-runtime-baseline.sh:
# "reusing existing instance without reset"), so user_b's server rows accumulate
# across runs. Run-specific upload proof therefore lives in (C) (dirty-count -> 0,
# which cannot false-pass); (D) proves the remote->device restore direction. user_b
# is exclusive to this flow and only this flow ever logs a workout for it, so the
# "1 exercise" history row asserted here is this suite's own logged session.
#
# Why a Maestro flow cannot assert the strict "ONLY that exercise was in the push
# payload": the push wire payload is not observable from the UI. That delta-only
# assertion is covered at the wire level by the jest push suite
# (app/__tests__/sync-cycle-push.test.ts, dirty-bit-only push). This flow proves
# the observable end goal: the logged exercise is uploaded and round-trips
# through the remote DB.

# === Phase A: new user, first sign-in, real bootstrap + sync ===
# Cold launch with no session: the route-layer guard lands on sign-in.
# `clearState` relaunches the dev client with a wiped sandbox, dropping its Metro
# connection, so re-open the dev-client deep link (carrying this worktree's Metro
# port, exported by maestro-ios-launch.sh) to reload the app bundle into the
# wiped sandbox. clearState reinstalled the app, so the expo-dev-client menu
# reappears over the app and BLOCKS sign-in: wait for the onboarding intro and
# dismiss it (Continue -> dev menu, Close -> app). The URL-scheme trust dialog is
# pre-authorized in maestro-ios-launch.sh, so there is no "Open" tap (absent it
# cost ~7s and FAILED on transient iOS-26 hierarchy errors). See
# auth-profile-happy-path for the failure screenshots that proved the dev menu is
# load-bearing after clearState.
- launchApp:
    clearState: true
- openLink: "${MAESTRO_IOS_DEV_CLIENT_URL}"
- extendedWaitUntil:
    visible:
      text: "Continue"
    timeout: 30000
# Settle the sheet, then retry each dismissal tap so the transient iOS-26
# `kAXErrorInvalidUIElement` (stale element ref during the post-clearState reload
# churn) is re-attempted rather than failing the run. Each retry wraps one tap
# and is idempotent: the element stays present until the tap succeeds.
- waitForAnimationToEnd:
    timeout: 4000
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Continue"
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Close"
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 60000
- assertVisible:
    id: "sign-in-card"
# No data screen may render before sign-in.
- assertNotVisible:
    id: "stats-history-screen"
- takeScreenshot: "16-first-run-roundtrip-signed-out"

# Sign in as the fixture user. The auth layer fires a real requestSync() on a
# live session (src/auth/service.ts), so the first authenticated cycle starts
# within ~1s. The first-sync gate stands in front of the data screen until the
# REAL bootstrapper->seed->push->pull cycle drains and stamps the bootstrap flag.
- tapOn:
    id: "sign-in-email-input"
- inputText: "${MAESTRO_ROUNDTRIP_EMAIL}"
- tapOn:
    id: "sign-in-password-input"
- inputText: "${MAESTRO_ROUNDTRIP_PASSWORD}"
- tapOn:
    id: "sign-in-submit-button"
# Let the real first cycle complete on its own (no harness stamp). Reaching the
# data screen with the gate block gone proves the gate lifted from real sync
# progress. A generous window absorbs sim/Metro warm-up.
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 90000
- assertNotVisible:
    id: "sync-gate-block"
- takeScreenshot: "17-first-run-roundtrip-bootstrapped"

# === Phase B: log exactly one exercise in a session ===
# Teleport to the recorder WITHOUT a data reset — the just-bootstrapped local DB
# (seeded catalog + bootstrap flag) must be preserved; we only need to navigate.
# No dev-menu/trust dismissal taps: this teleport runs in the already-loaded,
# signed-in app (no clearState since Phase A), so no dialog renders.
- openLink: "boga3://maestro-harness?teleport=session-recorder"
- extendedWaitUntil:
    visible:
      id: "start-session-button"
    timeout: 30000
- tapOn:
    id: "start-session-button"
- extendedWaitUntil:
    visible:
      id: "session-recorder-screen"
    timeout: 30000
- extendedWaitUntil:
    visible:
      text: "No exercises logged yet."
    timeout: 30000
- tapOn: "Log new exercise"
- tapOn: "Exercise filter input"
- inputText: "Barbell Back Squat"
- hideKeyboard:
    optional: true
# Selecting the seeded "Barbell Back Squat" here also implicitly proves the
# catalog bootstrapped in Phase A: the row only exists if the seed landed.
- extendedWaitUntil:
    visible:
      text: "Select exercise Barbell Back Squat"
    timeout: 15000
- tapOn:
    text: "Select exercise Barbell Back Squat"
- tapOn: "Weight for exercise 1 set 1"
- inputText: "135"
- tapOn: "Reps for exercise 1 set 1"
- inputText: "8"
# One complete set (weight + reps) submits straight through — no
# "Remove incomplete/empty" confirmation dialog renders, so the previous optional
# re-tap/confirmation taps were always absent (~7s each, WARNED). Assert the
# success screen directly; a blocked submit fails the extendedWaitUntil loudly.
- tapOn: "Submit Session"
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 30000
- takeScreenshot: "18-first-run-roundtrip-logged"

# === Phase C: force a sync, prove the logged delta uploaded (Pending -> 0) ===
# Poll for the settings screen rather than asserting it immediately after the tap:
# the transition can lag a beat on a cold-JIT first render, and extendedWaitUntil
# rides that out (an immediate assert is what flaked the auth lane once).
- tapOn:
    id: "top-level-settings-button"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "settings-sync-status-card"
    timeout: 30000
# Every status field must render on-device for the signed-in user — the surface
# check the standalone settings-sync-status flow used to own (its field-content
# assertions live in jest sync-status-panel.test.tsx). dirty-count is asserted
# below; refresh-button is exercised next.
- assertVisible:
    id: "settings-sync-status-last-success"
- assertVisible:
    id: "settings-sync-status-network"
- assertVisible:
    id: "settings-sync-status-error"
# Tap Refresh: fires a real full sync cycle (push the dirty delta + pull).
- tapOn:
    id: "settings-sync-status-refresh-button"
# Wait until "Pending changes" reads exactly 0 — the logged exercise's local
# dirty rows have all been accepted by the server. The combined id+text matcher
# targets the dirty-count field specifically so an unrelated "0" elsewhere cannot
# satisfy it. If the push never completes, this times out (correct failure).
- extendedWaitUntil:
    visible:
      id: "settings-sync-status-dirty-count"
      text: "0"
    timeout: 60000
- takeScreenshot: "19-first-run-roundtrip-delta-synced"

# === Phase D: full device wipe + re-sign-in -> data restored from remote ===
# clearState wipes BOTH the local SQLite AND the SecureStore session, modelling a
# fresh install / new device for the same account. Signing in again runs the real
# bootstrapper, which finds the server non-empty (catalog + the logged session
# from Phase C) and PULLS everything back — no re-seed.
# Second clearState reinstall -> dev-client menu reappears and blocks sign-in;
# dismiss it (Continue -> dev menu, Close -> app), same as Phase A. Trust dialog
# pre-authorized away (no "Open" tap).
- launchApp:
    clearState: true
- openLink: "${MAESTRO_IOS_DEV_CLIENT_URL}"
- extendedWaitUntil:
    visible:
      text: "Continue"
    timeout: 30000
# Settle the sheet, then retry each dismissal tap so the transient iOS-26
# `kAXErrorInvalidUIElement` (stale element ref during the post-clearState reload
# churn) is re-attempted rather than failing the run. Each retry wraps one tap
# and is idempotent: the element stays present until the tap succeeds.
- waitForAnimationToEnd:
    timeout: 4000
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Continue"
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Close"
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 60000
- tapOn:
    id: "sign-in-email-input"
- inputText: "${MAESTRO_ROUNDTRIP_EMAIL}"
- tapOn:
    id: "sign-in-password-input"
- inputText: "${MAESTRO_ROUNDTRIP_PASSWORD}"
- tapOn:
    id: "sign-in-submit-button"
# Gate lifts off the real re-pull cycle and lands on the data screen.
- extendedWaitUntil:
    visible:
      id: "stats-history-screen"
    timeout: 90000
- assertNotVisible:
    id: "sync-gate-block"
# Open the sessions history. After a full local wipe the only source of any
# session is the remote DB, so a restored "1 exercise" session row proves the
# logged workout is in the remote database.
- tapOn:
    id: "stats-card-sessions"
- assertVisible:
    id: "completed-history-scroll"
- extendedWaitUntil:
    visible:
      text: "1 exercise"
    timeout: 30000
- takeScreenshot: "20-first-run-roundtrip-restored-from-remote"
